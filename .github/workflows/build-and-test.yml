name: Build & Test

on:
  pull_request:
    branches: [Development]

concurrency:
  group: build-test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Trust Swift package plugins (SwiftLint)
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Locomotion.xcodeproj \
            -scheme Locomotion

      - name: Build
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project Locomotion.xcodeproj \
            -scheme Locomotion \
            -destination 'generic/platform=visionOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO \
            | xcbeautify

  test:
    name: Test
    runs-on: macos-26
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Trust Swift package plugins (SwiftLint)
        run: defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Locomotion.xcodeproj \
            -scheme LocomotionTests

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Locomotion.xcodeproj \
            -scheme LocomotionTests \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=NO \
            | xcbeautify
